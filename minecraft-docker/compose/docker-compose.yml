networks:
  mc-network:
    driver: bridge

services:
  velocity:
    build:
      context: ../../VC
      dockerfile: Dockerfile.velocity
    container_name: vc
    restart: unless-stopped
    ports:
      - "50016:50016" # Velocity bind port
    volumes:
      # 挂载配置目录。请确保您的velocity.toml已配置为监听 0.0.0.0:50016
      - ../../VC:/config
    # 移除了 environment 和 command，镜像内已定义
    networks:
      - mc-network

  # 2. 大厅服
  lobby:
    build:
      context: ../../lobby
      dockerfile: Dockerfile.lobby
    container_name: mc-lobby
    restart: unless-stopped
    environment:
        EULA: "true"
    expose:
      - "50015"  # 在Docker网络内暴露此端口，供Velocity连接
    volumes:
      - ../../lobby:/data
    # 移除了 environment 和 command，镜像内已定义
    networks:
      - mc-network
    depends_on:
      - velocity

  # 3. 生存游戏服
  survival:
    build:
      context: ../../2b2t
      dockerfile: Dockerfile.2b2t
    container_name: 2b2t
    restart: unless-stopped
    environment:
        EULA: "true"
    expose:
      - "50013"  # 在Docker网络内暴露此端口，供Velocity连接
    volumes:
      - ../../2b2t:/data
    # 移除了 environment 和 command，镜像内已定义
    networks:
      - mc-network
    depends_on:
      - velocity

  # MariaDB for shared plugin data (LuckPerms, etc.)
  mariadb:
    image: mariadb:11.4
    container_name: mc-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_CHARACTER_SET: utf8mb4
      MARIADB_COLLATE: utf8mb4_unicode_ci
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - mariadb_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - mc-network
    healthcheck:
      test: ["CMD", "mariadb", "--protocol=tcp", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}", "-e", "SELECT 1;"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  mariadb_data:
