shulker-box-break-limit: 48  # 每破坏多少个潜影盒后触发掉落
shulker-box-drop-amount: 1  # 每次掉落2个潜影盒
extra-shulker-box-drop-amount: 1  # 拥有权限时额外掉落1个潜影盒
# 说明：
# 插件刷新指令：/sbdreload  权限：shulkerboxdrop.reload
# 额外掉落权限：shulkerboxdrop.extra
#
# 拥有权限(true)：当挖掘数量到达 shulker-box-break-limit 后
# 最后一个潜影盒挖掘后掉落：shulker-box-drop-amount + extra-shulker-box-drop-amount 个盒子
#
# 例如：挖掘 5 个，掉落 10 个占用 1 个物品栏
# shulker-box-break-limit: 5
# shulker-box-drop-amount: 0
# extra-shulker-box-drop-amount: 10
#
# 例如：挖掘 5 个，掉落 10 个占用 2 个物品栏，为 3 + 7 个
# shulker-box-break-limit: 5
# shulker-box-drop-amount: 3
# extra-shulker-box-drop-amount: 7
#
# 没有权限(false)：当挖掘数量到达 shulker-box-break-limit 后
# 仅掉落原本的盒子