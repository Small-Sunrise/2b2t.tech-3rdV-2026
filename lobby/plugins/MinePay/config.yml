# 请前往官网完成支付配置
# https://minepay.top

# 服务器令牌
# 前往官网注册后
# 添加服务器获得
token: 'your-minepay-token-here'

# 降级线路选择
# 港澳台和海外需要更改降级线路
# 前往官网可查看线路列表
fallback-api: 

# 是否启用微信支付
wechat: true
# 是否启用支付宝支付
alipay: true

# 点券比例
# 充值一元玩家得到多少点券
# 比例设置为 0 关闭点券充值
# 可用变量：%player% 玩家名字
#         %point% 点券数量
#         %money% 充值金额
point-count: 1
point-name: '点券'
point-command:
- 'eco give %player% %point%'

# 是否启用异常日志上报（求别关闭，这对我们修复 bug 很重要的/(ㄒoㄒ)/~~）
# 提示：这个是不会发送敏感信息的，只会上报没有被捕获的 MinePay 异常
log-report: true

# 当前有人正在支付时,无法创建价格相同订单
# 关闭状态下会创建价格相同订单多0.01元
# 避免若玩家没注意到实际付款金额差异问题
line: false

# 下单成功给玩家显示标题
show-title: true

# 是否开启网页订单
# 关闭后插件将不查询网页订单或网页添加订单
# 若不需要网页下单购买请关闭以节省宽带资源
web-shop: true

# 查询订单发货时间间隔 单位:秒
# 若宽带足够可适当调低提高到账速度
check-time: 3

# 是否开启公告
# 管理员会收到 MinePay 最新消息
notice: true

# 若与龙核模组冲突导致无法显示地图
# 请打开此选项下单自动取消副手物品
off-hand: false

# 订单延时取消时间（单位：秒）
# 为了避免玩家充值时掉线或主动取消订单
# 导致玩家付款后订单在发货前被过早取消
# 如果没有以下情况强烈推荐保持默认十秒
# 由于您服务器使用了Geyser支持手机端
# 那么玩家在下单之后支付时大概率掉线
# 可以在不影响正常订单下酌情调大一些
delay-cancel: 10

# 禁用其他拦截插件联网插件
disable-network-manager-plugin: true

# 在你的机器出现 SSL 证书问题的时候
# 可以使用传统的 HTTP 协议
# 默认不建议开启，除非你的网络是可信的
use-http: false

# 是否启用高级网络特性
# 禁用后将会失去以下功能:
# 1. 自动重试
# 2. 节点切换
# 3. 所有节点都有问题会进行降级(直达转发站)尝试
enable-hyper-network-feature: true
