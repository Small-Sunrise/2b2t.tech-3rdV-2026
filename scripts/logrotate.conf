# Logrotate configuration for 2b2t.tech Minecraft servers
# Install: copy to /etc/logrotate.d/2b2t or run with:
#   logrotate -s /tmp/logrotate.state scripts/logrotate.conf

# Main 2b2t server logs
/path/to/2b2t.tech-3rdV-2026/2b2t/logs/*.log
/path/to/2b2t.tech-3rdV-2026/2b2t/logs/gc.log* {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
    dateext
    dateformat -%Y%m%d
}

# Lobby server logs
/path/to/2b2t.tech-3rdV-2026/lobby/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 50M
    dateext
    dateformat -%Y%m%d
}

# Velocity proxy logs
/path/to/2b2t.tech-3rdV-2026/VC/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 50M
    dateext
    dateformat -%Y%m%d
}

# Runtime logs directory
/path/to/2b2t.tech-3rdV-2026/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
    dateext
    dateformat -%Y%m%d
}
